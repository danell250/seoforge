services:
  - type: web
    name: seoforge-api
    runtime: node
    plan: standard
    buildCommand: "npm install -g pnpm && pnpm install && cd backend/api-server && pnpm run build:prod"
    startCommand: cd backend/api-server && pnpm start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: AUTH_BOOTSTRAP_ADMIN
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: CORS_ORIGIN
        value: https://seoforge.vercel.app
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 30
