openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SEOaxe API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: seo
    description: SEO optimization operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /optimize:
    post:
      operationId: optimizeHtml
      tags: [seo]
      summary: Optimize HTML for SEO and AEO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptimizeRequest"
      responses:
        "200":
          description: Optimized HTML with changes and score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizeResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Optimization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /crawl-site:
    post:
      operationId: crawlSite
      tags: [seo]
      summary: Crawl a website and return discovered HTML pages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrawlSiteRequest"
      responses:
        "200":
          description: Pages discovered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlSiteResponseBody"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Crawl failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /aeo-block:
    post:
      operationId: generateAeoBlock
      tags: [seo]
      summary: Generate AEO answer blocks and FAQPage schema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AeoBlockRequest"
      responses:
        "200":
          description: HTML augmented with answer blocks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AeoBlockResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /optimizations:
    get:
      operationId: listOptimizations
      tags: [seo]
      summary: List recent optimizations
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationListResult"
  /optimizations/{id}:
    delete:
      operationId: deleteOptimization
      tags: [seo]
      summary: Delete an optimization record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [seo]
      summary: Aggregate dashboard stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResult"
  /deploy/wordpress:
    post:
      operationId: deployToWordpress
      tags: [seo]
      summary: Push optimized HTML to a WordPress page or post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordpressDeployRequest"
      responses:
        "200":
          description: Deployed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Deploy failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /deploy/shopify:
    post:
      operationId: deployToShopify
      tags: [seo]
      summary: Push optimized HTML to a Shopify page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopifyDeployRequest"
      responses:
        "200":
          description: Deployed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Deploy failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /agency-settings:
    get:
      operationId: getAgencySettings
      tags: [seo]
      summary: Get current agency white-label settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencySettings"
    put:
      operationId: updateAgencySettings
      tags: [seo]
      summary: Update agency white-label settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgencySettingsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencySettings"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sitemap-urls:
    get:
      operationId: listSitemapUrls
      tags: [seo]
      summary: List sitemap entries
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitemapUrlListResult"
    post:
      operationId: addSitemapUrl
      tags: [seo]
      summary: Add a URL to the sitemap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SitemapUrlInput"
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitemapUrlRecord"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sitemap-urls/{id}:
    delete:
      operationId: deleteSitemapUrl
      tags: [seo]
      summary: Remove a URL from the sitemap
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOptimizationResponseAlias"
  /hreflang:
    post:
      operationId: applyHreflang
      tags: [seo]
      summary: Detect language and inject hreflang alternates into HTML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HreflangRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HreflangResult"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /content-gaps:
    post:
      operationId: detectContentGaps
      tags: [seo]
      summary: Detect missing content topics and inject new sections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentGapRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentGapResult"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /monitor/sites:
    get:
      operationId: listMonitoredSites
      tags: [seo]
      summary: List monitored sites
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoredSiteList"
    post:
      operationId: createMonitoredSite
      tags: [seo]
      summary: Add a site to weekly monitoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonitoredSiteRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoredSite"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /monitor/sites/{id}:
    delete:
      operationId: deleteMonitoredSite
      tags: [seo]
      summary: Remove a monitored site
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"
  /monitor/sites/{id}/run:
    post:
      operationId: runMonitoredSite
      tags: [seo]
      summary: Trigger an immediate re-crawl and diff for a monitored site
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorReport"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Run failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /monitor/sites/{id}/reports:
    get:
      operationId: listMonitorReports
      tags: [seo]
      summary: List historical reports for a monitored site
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitorReportList"
  /scan-competitor:
    post:
      operationId: scanCompetitor
      tags: [seo]
      summary: Scan a competitor URL for SEO strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanCompetitorRequest"
      responses:
        "200":
          description: Competitor analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorScan"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Scan failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /generate-blog:
    post:
      operationId: generateBlogArticle
      tags: [seo]
      summary: Generate a 1500-word AEO-optimized blog article from optimized HTML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogGenerationRequest"
      responses:
        "200":
          description: Generated blog article with metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogGenerationResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    OptimizeRequest:
      type: object
      properties:
        html:
          type: string
          description: The HTML source code to optimize
        filename:
          type: string
          description: Optional filename for context
      required:
        - html
    SeoScore:
      type: object
      properties:
        technical:
          type: integer
          minimum: 0
          maximum: 100
        content:
          type: integer
          minimum: 0
          maximum: 100
        aeo:
          type: integer
          minimum: 0
          maximum: 100
        overall:
          type: integer
          minimum: 0
          maximum: 100
      required:
        - technical
        - content
        - aeo
        - overall
    ScoreImprovement:
      type: object
      properties:
        technical:
          type: integer
          description: Points gained in technical SEO
        content:
          type: integer
          description: Points gained in content SEO
        aeo:
          type: integer
          description: Points gained in AEO readiness
        overall:
          type: integer
          description: Total overall score improvement
      required:
        - technical
        - content
        - aeo
        - overall
    OptimizeResponse:
      type: object
      properties:
        optimizedHtml:
          type: string
        changes:
          type: array
          items:
            type: string
        score:
          $ref: "#/components/schemas/SeoScore"
        originalScore:
          $ref: "#/components/schemas/SeoScore"
          description: SEO scores before optimization
        scoreImprovement:
          $ref: "#/components/schemas/ScoreImprovement"
          description: Points gained from optimization
        detectedLanguage:
          type: string
          description: ISO 639-1 language code (en, af, zu, xh, pcm, sw)
        languageGuidance:
          type: string
          description: Description of African language optimizations applied
        africanLanguageSupport:
          $ref: "#/components/schemas/AfricanLanguageSupport"
      required:
        - optimizedHtml
        - changes
        - score
        - originalScore
        - scoreImprovement
    AfricanLanguageSupport:
      type: object
      properties:
        detected:
          type: string
          enum: [en, af, zu, xh, pcm, sw]
          description: Detected African language code
        config:
          $ref: "#/components/schemas/AfricanLanguageConfig"
        hreflangTags:
          type: string
          description: Generated hreflang tags for African market support
      required:
        - detected
        - hreflangTags
    AfricanLanguageConfig:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        nativeName:
          type: string
        region:
          type: string
        speakers:
          type: string
        searchBehavior:
          type: object
          properties:
            voiceSearchPrevalence:
              type: string
              enum: [high, medium, low]
            mobileFirst:
              type: boolean
            localIntent:
              type: string
              enum: [high, medium, low]
        seoGuidance:
          type: object
          properties:
            keywordStrategy:
              type: string
        aeoGuidance:
          type: object
          properties:
            questionPatterns:
              type: array
              items:
                type: string
            answerFormat:
              type: string
    ScanCompetitorRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
      required:
        - url
    CrawlSiteRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        maxPages:
          type: integer
          minimum: 1
          maximum: 50
      required:
        - url
    CrawledPage:
      type: object
      properties:
        url:
          type: string
        filename:
          type: string
        html:
          type: string
        title:
          type: string
      required:
        - url
        - filename
        - html
        - title
    CrawlSiteResponseBody:
      type: object
      properties:
        domain:
          type: string
        pages:
          type: array
          items:
            $ref: "#/components/schemas/CrawledPage"
      required:
        - domain
        - pages
    AeoBlockRequest:
      type: object
      properties:
        html:
          type: string
        topic:
          type: string
      required:
        - html
    AeoQuestion:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
      required:
        - question
        - answer
    AeoBlockResult:
      type: object
      properties:
        html:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/AeoQuestion"
        schemaJsonLd:
          type: string
      required:
        - html
        - questions
        - schemaJsonLd
    OptimizationRecord:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        score:
          $ref: "#/components/schemas/SeoScore"
        changesCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - score
        - changesCount
        - createdAt
    OptimizationListResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OptimizationRecord"
      required:
        - items
    DashboardSummaryResult:
      type: object
      properties:
        totalPages:
          type: integer
        avgOverall:
          type: integer
        avgTechnical:
          type: integer
        avgContent:
          type: integer
        avgAeo:
          type: integer
        greenCount:
          type: integer
        orangeCount:
          type: integer
        redCount:
          type: integer
        recent:
          type: array
          items:
            $ref: "#/components/schemas/OptimizationRecord"
      required:
        - totalPages
        - avgOverall
        - avgTechnical
        - avgContent
        - avgAeo
        - greenCount
        - orangeCount
        - redCount
        - recent
    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    WordpressDeployRequest:
      type: object
      properties:
        siteUrl:
          type: string
          format: uri
        username:
          type: string
        appPassword:
          type: string
        postType:
          type: string
          enum: [pages, posts]
        postId:
          type: integer
        html:
          type: string
      required:
        - siteUrl
        - username
        - appPassword
        - postType
        - postId
        - html
    ShopifyDeployRequest:
      type: object
      properties:
        shop:
          type: string
        accessToken:
          type: string
        pageId:
          type: integer
        html:
          type: string
      required:
        - shop
        - accessToken
        - pageId
        - html
    DeployResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        url:
          type: string
          nullable: true
      required:
        - success
        - message
    AgencySettings:
      type: object
      properties:
        brandName:
          type: string
        tagline:
          type: string
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
        supportEmail:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
      required:
        - brandName
        - tagline
        - primaryColor
    AgencySettingsInput:
      type: object
      properties:
        brandName:
          type: string
          minLength: 1
          maxLength: 60
        tagline:
          type: string
          minLength: 1
          maxLength: 200
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
        supportEmail:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
      required:
        - brandName
        - tagline
        - primaryColor
    SitemapUrlRecord:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        priority:
          type: integer
        changefreq:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - url
        - priority
        - changefreq
        - createdAt
    SitemapUrlInput:
      type: object
      properties:
        url:
          type: string
          format: uri
        priority:
          type: integer
          minimum: 0
          maximum: 100
        changefreq:
          type: string
          enum: [always, hourly, daily, weekly, monthly, yearly, never]
      required:
        - url
    SitemapUrlListResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SitemapUrlRecord"
      required:
        - items
    DeleteOptimizationResponseAlias:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    HreflangAlternate:
      type: object
      properties:
        hreflang:
          type: string
        href:
          type: string
          format: uri
      required:
        - hreflang
        - href
    HreflangRequest:
      type: object
      properties:
        html:
          type: string
        alternates:
          type: array
          items:
            $ref: "#/components/schemas/HreflangAlternate"
      required:
        - html
        - alternates
    HreflangResult:
      type: object
      properties:
        html:
          type: string
        detectedLanguage:
          type: string
        injectedTags:
          type: array
          items:
            type: string
      required:
        - html
        - detectedLanguage
        - injectedTags
    ContentGapRequest:
      type: object
      properties:
        html:
          type: string
        topic:
          type: string
        audience:
          type: string
      required:
        - html
        - topic
    ContentGapItem:
      type: object
      properties:
        question:
          type: string
        why:
          type: string
        impact:
          type: string
          enum: [high, medium, low]
        sectionTitle:
          type: string
        sectionHtml:
          type: string
      required:
        - question
        - why
        - impact
        - sectionTitle
        - sectionHtml
    ContentGapResult:
      type: object
      properties:
        gaps:
          type: array
          items:
            $ref: "#/components/schemas/ContentGapItem"
        augmentedHtml:
          type: string
        coverageScoreBefore:
          type: integer
        coverageScoreAfter:
          type: integer
      required:
        - gaps
        - augmentedHtml
        - coverageScoreBefore
        - coverageScoreAfter
    CompetitorScan:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        strategy:
          type: object
          properties:
            metaStrategy:
              type: string
            targetKeywords:
              type: array
              items:
                type: string
            schemaUsage:
              type: array
              items:
                type: string
            contentStructure:
              type: string
          required:
            - metaStrategy
            - targetKeywords
            - schemaUsage
            - contentStructure
        beatThem:
          type: array
          items:
            type: string
      required:
        - url
        - title
        - strategy
        - beatThem
    SimpleOk:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: string }
      required: [ok]
    CreateMonitoredSiteRequest:
      type: object
      properties:
        url: { type: string, minLength: 3 }
        email: { type: string, format: email }
        topic: { type: string, maxLength: 200 }
        audience: { type: string, maxLength: 200 }
        maxPages: { type: integer, minimum: 1, maximum: 50 }
        frequency: { type: string, enum: [daily, weekly, monthly] }
      required: [url, email]
    MonitoredSite:
      type: object
      properties:
        id: { type: integer }
        url: { type: string }
        domain: { type: string }
        email: { type: string }
        topic: { type: string, nullable: true }
        audience: { type: string, nullable: true }
        frequency: { type: string }
        maxPages: { type: integer }
        enabled: { type: boolean }
        nextRunAt: { type: string }
        lastRunAt: { type: string, nullable: true }
        createdAt: { type: string }
      required: [id, url, domain, email, frequency, maxPages, enabled, nextRunAt, createdAt]
    MonitoredSiteList:
      type: object
      properties:
        sites:
          type: array
          items: { $ref: "#/components/schemas/MonitoredSite" }
      required: [sites]
    MonitorPageDiff:
      type: object
      properties:
        url: { type: string }
        title: { type: string }
        status: { type: string, enum: [new, removed, regressed, improved, unchanged, error] }
        previousScore: { type: integer, nullable: true }
        currentScore: { type: integer, nullable: true }
        scoreDelta: { type: integer }
        previousGaps: { type: integer, nullable: true }
        currentGaps: { type: integer }
        newGapQuestions:
          type: array
          items: { type: string }
      required: [url, title, status, scoreDelta, currentGaps, newGapQuestions]
    MonitorReport:
      type: object
      properties:
        id: { type: integer }
        siteId: { type: integer }
        summary: { type: string }
        pagesScanned: { type: integer }
        regressionsCount: { type: integer }
        newGapsCount: { type: integer }
        emailedTo: { type: string, nullable: true }
        emailedAt: { type: string, nullable: true }
        createdAt: { type: string }
        diffs:
          type: array
          items: { $ref: "#/components/schemas/MonitorPageDiff" }
      required: [id, siteId, summary, pagesScanned, regressionsCount, newGapsCount, createdAt, diffs]
    MonitorReportList:
      type: object
      properties:
        reports:
          type: array
          items: { $ref: "#/components/schemas/MonitorReport" }
      required: [reports]
    BlogGenerationRequest:
      type: object
      properties:
        html:
          type: string
          description: The optimized HTML content to base the blog article on
        topic:
          type: string
          description: Optional topic hint for the blog article
        targetLanguage:
          type: string
          enum: [en, af, zu, xh, pcm, sw]
          description: Target African language for the blog article (auto-detected if not specified)
      required:
        - html
    BlogGenerationResult:
      type: object
      properties:
        title:
          type: string
          description: The main H1 title of the blog article
        metaTitle:
          type: string
          description: SEO meta title for search results (under 60 characters)
        metaDescription:
          type: string
          description: SEO meta description (under 160 characters)
        slug:
          type: string
          description: URL-friendly slug for the blog article
        content:
          type: string
          description: Full HTML content of the blog article with proper formatting
        wordCount:
          type: integer
          description: Estimated word count of the article
        language:
          type: string
          enum: [en, af, zu, xh, pcm, sw]
          description: Language code of the generated blog article
        languageName:
          type: string
          description: Human-readable language name
      required:
        - title
        - metaTitle
        - metaDescription
        - slug
        - content
        - wordCount
