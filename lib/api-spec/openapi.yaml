openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SEOForge API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: seo
    description: SEO optimization operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /optimize:
    post:
      operationId: optimizeHtml
      tags: [seo]
      summary: Optimize HTML for SEO and AEO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptimizeRequest"
      responses:
        "200":
          description: Optimized HTML with changes and score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizeResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Optimization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /crawl-site:
    post:
      operationId: crawlSite
      tags: [seo]
      summary: Crawl a website and return discovered HTML pages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrawlSiteRequest"
      responses:
        "200":
          description: Pages discovered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrawlSiteResponseBody"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Crawl failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /aeo-block:
    post:
      operationId: generateAeoBlock
      tags: [seo]
      summary: Generate AEO answer blocks and FAQPage schema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AeoBlockRequest"
      responses:
        "200":
          description: HTML augmented with answer blocks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AeoBlockResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /optimizations:
    get:
      operationId: listOptimizations
      tags: [seo]
      summary: List recent optimizations
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptimizationListResult"
  /optimizations/{id}:
    delete:
      operationId: deleteOptimization
      tags: [seo]
      summary: Delete an optimization record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [seo]
      summary: Aggregate dashboard stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummaryResult"
  /deploy/wordpress:
    post:
      operationId: deployToWordpress
      tags: [seo]
      summary: Push optimized HTML to a WordPress page or post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WordpressDeployRequest"
      responses:
        "200":
          description: Deployed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Deploy failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /deploy/shopify:
    post:
      operationId: deployToShopify
      tags: [seo]
      summary: Push optimized HTML to a Shopify page
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopifyDeployRequest"
      responses:
        "200":
          description: Deployed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Deploy failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /agency-settings:
    get:
      operationId: getAgencySettings
      tags: [seo]
      summary: Get current agency white-label settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencySettings"
    put:
      operationId: updateAgencySettings
      tags: [seo]
      summary: Update agency white-label settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgencySettingsInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencySettings"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sitemap-urls:
    get:
      operationId: listSitemapUrls
      tags: [seo]
      summary: List sitemap entries
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitemapUrlListResult"
    post:
      operationId: addSitemapUrl
      tags: [seo]
      summary: Add a URL to the sitemap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SitemapUrlInput"
      responses:
        "200":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SitemapUrlRecord"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /sitemap-urls/{id}:
    delete:
      operationId: deleteSitemapUrl
      tags: [seo]
      summary: Remove a URL from the sitemap
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteOptimizationResponseAlias"
  /hreflang:
    post:
      operationId: applyHreflang
      tags: [seo]
      summary: Detect language and inject hreflang alternates into HTML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HreflangRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HreflangResult"
        "400":
          description: Invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /scan-competitor:
    post:
      operationId: scanCompetitor
      tags: [seo]
      summary: Scan a competitor URL for SEO strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanCompetitorRequest"
      responses:
        "200":
          description: Competitor analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitorScan"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Scan failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    OptimizeRequest:
      type: object
      properties:
        html:
          type: string
          description: The HTML source code to optimize
        filename:
          type: string
          description: Optional filename for context
      required:
        - html
    SeoScore:
      type: object
      properties:
        technical:
          type: integer
          minimum: 0
          maximum: 100
        content:
          type: integer
          minimum: 0
          maximum: 100
        aeo:
          type: integer
          minimum: 0
          maximum: 100
        overall:
          type: integer
          minimum: 0
          maximum: 100
      required:
        - technical
        - content
        - aeo
        - overall
    OptimizeResponse:
      type: object
      properties:
        optimizedHtml:
          type: string
        changes:
          type: array
          items:
            type: string
        score:
          $ref: "#/components/schemas/SeoScore"
      required:
        - optimizedHtml
        - changes
        - score
    ScanCompetitorRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
      required:
        - url
    CrawlSiteRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        maxPages:
          type: integer
          minimum: 1
          maximum: 50
      required:
        - url
    CrawledPage:
      type: object
      properties:
        url:
          type: string
        filename:
          type: string
        html:
          type: string
        title:
          type: string
      required:
        - url
        - filename
        - html
        - title
    CrawlSiteResponseBody:
      type: object
      properties:
        domain:
          type: string
        pages:
          type: array
          items:
            $ref: "#/components/schemas/CrawledPage"
      required:
        - domain
        - pages
    AeoBlockRequest:
      type: object
      properties:
        html:
          type: string
        topic:
          type: string
      required:
        - html
    AeoQuestion:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
      required:
        - question
        - answer
    AeoBlockResult:
      type: object
      properties:
        html:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/AeoQuestion"
        schemaJsonLd:
          type: string
      required:
        - html
        - questions
        - schemaJsonLd
    OptimizationRecord:
      type: object
      properties:
        id:
          type: integer
        filename:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        score:
          $ref: "#/components/schemas/SeoScore"
        changesCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - score
        - changesCount
        - createdAt
    OptimizationListResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OptimizationRecord"
      required:
        - items
    DashboardSummaryResult:
      type: object
      properties:
        totalPages:
          type: integer
        avgOverall:
          type: integer
        avgTechnical:
          type: integer
        avgContent:
          type: integer
        avgAeo:
          type: integer
        greenCount:
          type: integer
        orangeCount:
          type: integer
        redCount:
          type: integer
        recent:
          type: array
          items:
            $ref: "#/components/schemas/OptimizationRecord"
      required:
        - totalPages
        - avgOverall
        - avgTechnical
        - avgContent
        - avgAeo
        - greenCount
        - orangeCount
        - redCount
        - recent
    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    WordpressDeployRequest:
      type: object
      properties:
        siteUrl:
          type: string
          format: uri
        username:
          type: string
        appPassword:
          type: string
        postType:
          type: string
          enum: [pages, posts]
        postId:
          type: integer
        html:
          type: string
      required:
        - siteUrl
        - username
        - appPassword
        - postType
        - postId
        - html
    ShopifyDeployRequest:
      type: object
      properties:
        shop:
          type: string
        accessToken:
          type: string
        pageId:
          type: integer
        html:
          type: string
      required:
        - shop
        - accessToken
        - pageId
        - html
    DeployResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        url:
          type: string
          nullable: true
      required:
        - success
        - message
    AgencySettings:
      type: object
      properties:
        brandName:
          type: string
        tagline:
          type: string
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
        supportEmail:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
      required:
        - brandName
        - tagline
        - primaryColor
    AgencySettingsInput:
      type: object
      properties:
        brandName:
          type: string
          minLength: 1
          maxLength: 60
        tagline:
          type: string
          minLength: 1
          maxLength: 200
        logoUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
        supportEmail:
          type: string
          nullable: true
        websiteUrl:
          type: string
          nullable: true
      required:
        - brandName
        - tagline
        - primaryColor
    SitemapUrlRecord:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
        priority:
          type: integer
        changefreq:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - url
        - priority
        - changefreq
        - createdAt
    SitemapUrlInput:
      type: object
      properties:
        url:
          type: string
          format: uri
        priority:
          type: integer
          minimum: 0
          maximum: 100
        changefreq:
          type: string
          enum: [always, hourly, daily, weekly, monthly, yearly, never]
      required:
        - url
    SitemapUrlListResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SitemapUrlRecord"
      required:
        - items
    DeleteOptimizationResponseAlias:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    HreflangAlternate:
      type: object
      properties:
        hreflang:
          type: string
        href:
          type: string
          format: uri
      required:
        - hreflang
        - href
    HreflangRequest:
      type: object
      properties:
        html:
          type: string
        alternates:
          type: array
          items:
            $ref: "#/components/schemas/HreflangAlternate"
      required:
        - html
        - alternates
    HreflangResult:
      type: object
      properties:
        html:
          type: string
        detectedLanguage:
          type: string
        injectedTags:
          type: array
          items:
            type: string
      required:
        - html
        - detectedLanguage
        - injectedTags
    CompetitorScan:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        strategy:
          type: object
          properties:
            metaStrategy:
              type: string
            targetKeywords:
              type: array
              items:
                type: string
            schemaUsage:
              type: array
              items:
                type: string
            contentStructure:
              type: string
          required:
            - metaStrategy
            - targetKeywords
            - schemaUsage
            - contentStructure
        beatThem:
          type: array
          items:
            type: string
      required:
        - url
        - title
        - strategy
        - beatThem
